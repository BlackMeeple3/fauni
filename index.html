<div id="setup">
  <h1>Il Regno dei Faùni</h1>
  <p>Lab v2.0 · reti globali, contributi, congelamento automatico. Tu sei <b style="color:#F2EFE4">Bianco</b>.</p>
  <div class="pc">

<div id="hdr">
  <span class="t">Il Regno dei Faùni <span style="font-size:10px;color:var(--ink2)">v2.0</span></span>

</div>

</div>

  <button class="btn gold" id="endExit">Nuova partita</button>
</div>
<div id="toast"></div>

<script>
'use strict';
/* ===== PARAMETRI DA TARARE ===== */
const THRESHOLDS=[6,8,10];    // soglie L1,L2,L3 (tarate su 100 partite simulate)
const FREEZE_BONUS=[2,3,4];    // bonus a chi esegue la mossa che congela
const PTS_PER_TILE=1;          // punti per ogni propria tessera nella rete
const MIN_ADJ_AFTER=6;         // dopo N tessere servono 2 lati adiacenti
const MAX_ROUNDS=25;

/* ===== COSTANTI ===== */
const BIOMES=['selva','pascolo','torrente','borgo'];
const TCOL={selva:'#3F6B4B',pascolo:'#A9B35A',torrente:'#5E9EC4',borgo:'#B5795B'};
const TNAME={selva:'Selva',pascolo:'Pascolo',torrente:'Torrente',borgo:'Borgo'};
const TEMOJI={selva:'🌲',pascolo:'🌿',torrente:'💧',borgo:'🏛️'};
const PCOLORS=['#F2EFE4','#E0B341','#C4574A','#8E7CC3'];
const PNAMES=['Tu','Bot Ocra','Bot Rosso','Bot Viola'];
const DIRS=[[1,0],[0,1],[-1,1],[-1,0],[0,-1],[1,-1]];

/* ===== MAZZO ===== */
let tid=0;
const mk=b=>({id:++tid,biomes:b.slice(),owner:null,frozenFor:[]});
function shuffle(d){for(let i=d.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[d[i],d[j]]=[d[j],d[i]]}return d}
function buildDeck(){
  const d=[];
  /* mono: rare (3 per bioma = 12) */
  for(const b of BIOMES)for(let i=0;i<3;i++)d.push(mk([b]));
  /* bi: 8 per coppia (6 coppie = 48) */
  const pairs=[];for(let i=0;i<4;i++)for(let j=i+1;j<4;j++)pairs.push([BIOMES[i],BIOMES[j]]);
  for(const p of pairs)for(let i=0;i<8;i++)d.push(mk(p));
  /* tri: 4 per tripla (4 triple = 16) */
  for(let skip=0;skip<4;skip++){const t=BIOMES.filter((_,i)=>i!==skip);for(let i=0;i<4;i++)d.push(mk(t))}
  /* tetra: 8 */
  for(let i=0;i<8;i++)d.push(mk(BIOMES.slice()));
  return shuffle(d);
}

/* ===== GEOMETRIA ===== */
const key=(q,r)=>q+','+r;
const unkey=k=>k.split(',').map(Number);

/* ===== RETI ===== */
function networks(valley,biome){
  /* gruppi connessi di tessere che contengono il bioma e non l'hanno già speso */
  const nodes=new Set();
  for(const[k,t]of valley)
    if(t.biomes.includes(biome)&&!t.frozenFor.includes(biome))nodes.add(k);
  const vis=new Set();const groups=[];
  for(const start of nodes){
    if(vis.has(start))continue;
    const grp=[];const q=[start];vis.add(start);
    while(q.length){const k=q.shift();grp.push(k);
      const[cq,cr]=unkey(k);
      for(const[dq,dr]of DIRS){const nk=key(cq+dq,cr+dr);
        if(nodes.has(nk)&&!vis.has(nk)){vis.add(nk);q.push(nk)}}}
    groups.push(grp);
  }
  return groups;
}

/* ===== SCIVOLAMENTO REGINA ===== */
function canSlide(valley,fromKey,toKey){
  const[fq,fr]=unkey(fromKey),[tq,tr]=unkey(toKey);
  if(!DIRS.some(([dq,dr])=>fq+dq===tq&&fr+dr===tr))return false;
  if(valley.has(toKey))return false;
  const t=valley.get(fromKey);
  if(!t||t.frozenFor.length>0)return false;
  /* freedom to move */
  const shared=[];
  for(const[dq,dr]of DIRS){
    const nk=key(fq+dq,fr+dr);if(nk===toKey)continue;
    if(DIRS.some(([a,b])=>key(tq+a,tr+b)===nk))shared.push(nk);
  }
  if(shared.length>=2&&shared.every(k=>valley.has(k)))return false;
  /* connessione */
  const test=new Map(valley);test.delete(fromKey);
  if(test.size>0){
    const start=test.keys().next().value;
    const vis=new Set([start]);const q=[start];
    while(q.length){const k=q.shift();const[cq,cr]=unkey(k);
      for(const[dq,dr]of DIRS){const nk=key(cq+dq,cr+dr);
        if(test.has(nk)&&!vis.has(nk)){vis.add(nk);q.push(nk)}}}
    if(vis.size!==test.size)return false;
  }
  /* adiacenza post-mossa */
  return DIRS.some(([dq,dr])=>{const nk=key(tq+dq,tr+dr);return valley.has(nk)&&nk!==fromKey});
}
function slideCands(valley,fromKey){
  const[fq,fr]=unkey(fromKey);
  return DIRS.map(([dq,dr])=>key(fq+dq,fr+dr)).filter(nk=>canSlide(valley,fromKey,nk));
}
function placeCells(valley){
  const seen=new Set(valley.keys());const out=[];
  for(const k of valley.keys()){const[q,r]=unkey(k);
    for(const[dq,dr]of DIRS){const nk=key(q+dq,r+dr);
      if(!seen.has(nk)){seen.add(nk);out.push(nk)}}}
  if(valley.size<=MIN_ADJ_AFTER)return out;
  return out.filter(k=>{const[q,r]=unkey(k);
    return DIRS.filter(([dq,dr])=>valley.has(key(q+dq,r+dr))).length>=2});
}

/* ===== STATO ===== */
let S=null;
let MODE_ACTION='place',SLIDE_FROM=null,DRAWN=null;
function newGame(nBots){
  const np=nBots+1;
  S={np,deck:buildDeck(),valley:new Map(),
    players:[],round:1,seat:0,phase:'idle',
    thIdx:{selva:0,pascolo:0,torrente:0,borgo:0},
    log:[],over:false};
  S.valley.set(key(0,0),S.deck.pop());
  for(let i=0;i<np;i++)S.players.push({name:PNAMES[i],color:PCOLORS[i],score:0,isBot:i>0});
}
const curIdx=()=>(S.round-1+S.seat)%S.np;
const curP=()=>S.players[curIdx()];

/* ===== CONGELAMENTO ===== */
function detectFreezes(valley,thIdx){
  const out=[];
  for(const b of BIOMES){
    if(thIdx[b]>=THRESHOLDS.length)continue;
    const need=THRESHOLDS[thIdx[b]];
    for(const grp of networks(valley,b))
      if(grp.length>=need)out.push({biome:b,group:grp,level:thIdx[b]});
  }
  return out;
}
function applyFreezes(freezes,moverIdx){
  const events=[];
  for(const f of freezes){
    const contrib={};
    for(const k of f.group){
      const t=S.valley.get(k);
      t.frozenFor.push(f.biome);
      if(t.owner!==null)contrib[t.owner]=(contrib[t.owner]||0)+1;
    }
    const bonus=FREEZE_BONUS[f.level];
    for(const[pi,n]of Object.entries(contrib))S.players[pi].score+=n*PTS_PER_TILE;
    S.players[moverIdx].score+=bonus;
    S.thIdx[f.biome]++;
    events.push({biome:f.biome,level:f.level,size:f.group.length,contrib,bonus,by:moverIdx,round:S.round});
    S.log.push(events[events.length-1]);
  }
  return events;
}
function gameOver(){
  if(BIOMES.every(b=>S.thIdx[b]>=THRESHOLDS.length))return true;
  if(!S.deck.length)return true;
  if(S.round>MAX_ROUNDS)return true;
  return false;
}

/* ===== AZIONI ===== */
function doPlace(k,tile,pi){
  tile.owner=pi;S.valley.set(k,tile);
  return applyFreezes(detectFreezes(S.valley,S.thIdx),pi);
}
function doSlide(fromK,toK,pi){
  const t=S.valley.get(fromK);
  S.valley.delete(fromK);S.valley.set(toK,t);
  return applyFreezes(detectFreezes(S.valley,S.thIdx),pi);
}

/* ===== BOT ===== */
function botEvalPlace(k,tile,pi){
  /* valuta congelamenti immediati + sviluppo */
  let sc=Math.random()*0.2;
  const[q,r]=unkey(k);
  for(const b of tile.biomes){
    if(S.thIdx[b]>=THRESHOLDS.length)continue;
    const need=THRESHOLDS[S.thIdx[b]];
    /* gruppo virtuale: BFS da k su nodi del bioma + k */
    const nodes=new Set([k]);
    for(const[kk,t]of S.valley)
      if(t.biomes.includes(b)&&!t.frozenFor.includes(b))nodes.add(kk);
    const vis=new Set([k]);const qq=[k];const grp=[k];
    while(qq.length){const ck=qq.shift();const[cq,cr]=unkey(ck);
      for(const[dq,dr]of DIRS){const nk=key(cq+dq,cr+dr);
        if(nodes.has(nk)&&!vis.has(nk)){vis.add(nk);qq.push(nk);grp.push(nk)}}}
    if(grp.length>=need){
      /* congela: calcola punti miei vs altrui */
      let mine=1,theirs=0; /* la mia tessera nuova */
      for(const kk of grp){if(kk===k)continue;
        const t=S.valley.get(kk);if(t.owner===null)continue;
        if(t.owner===pi)mine++;else theirs++}
      sc+=mine*PTS_PER_TILE+FREEZE_BONUS[S.thIdx[b]]-0.8*theirs*PTS_PER_TILE;
    }else{
      /* sviluppo: +0.2 per tessera mia che si aggiunge a rete */
      sc+=0.25;
      /* penalità: porto la rete a soglia-1 e non sono il top contributor */
      if(grp.length===need-1){
        let mine=1,top=0;
        const cnt={};
        for(const kk of grp){if(kk===k)continue;const t=S.valley.get(kk);
          if(t.owner===null)continue;cnt[t.owner]=(cnt[t.owner]||0)+1}
        for(const[o,n]of Object.entries(cnt)){if(+o===pi)mine+=n;else if(n>top)top=n}
        if(top>mine)sc-=0.6*(top-mine);
      }
    }
  }
  return sc;
}
function botEvalSlide(fromK,toK,pi){
  let sc=Math.random()*0.15-0.1; /* leggera preferenza per piazzare */
  const t=S.valley.get(fromK);
  /* simula */
  S.valley.delete(fromK);S.valley.set(toK,t);
  const fr=detectFreezes(S.valley,S.thIdx);
  for(const f of fr){
    let mine=0,theirs=0;
    for(const kk of f.group){const tt=S.valley.get(kk);
      if(tt.owner===null)continue;
      if(tt.owner===pi)mine++;else theirs++}
    sc+=mine*PTS_PER_TILE+FREEZE_BONUS[f.level]-0.8*theirs*PTS_PER_TILE;
  }
  /* sabotage: per ogni bioma, gruppi a soglia-1 con top altrui PRIMA che ora non esistono */
  S.valley.delete(toK);S.valley.set(fromK,t); /* ripristina */
  const before=threatCount(pi);
  S.valley.delete(fromK);S.valley.set(toK,t);
  const after=threatCount(pi);
  S.valley.delete(toK);S.valley.set(fromK,t);
  sc+=0.9*(before-after);
  return sc;
}
function threatCount(pi){
  /* gruppi altrui a soglia-1 */
  let n=0;
  for(const b of BIOMES){
    if(S.thIdx[b]>=THRESHOLDS.length)continue;
    const need=THRESHOLDS[S.thIdx[b]];
    for(const grp of networks(S.valley,b)){
      if(grp.length!==need-1)continue;
      const cnt={};
      for(const kk of grp){const t=S.valley.get(kk);if(t.owner===null)continue;
        cnt[t.owner]=(cnt[t.owner]||0)+1}
      let topO=-1,top=0;
      for(const[o,c]of Object.entries(cnt))if(c>top){top=c;topO=+o}
      if(topO!==pi&&topO>=0)n++;
    }
  }
  return n;
}
function botTurn(pi){
  if(!S.deck.length){advance();return}
  const tile=S.deck.pop();
  let best={sc:-1e9,type:null};
  for(const k of placeCells(S.valley)){
    const sc=botEvalPlace(k,tile,pi);
    if(sc>best.sc)best={sc,type:'place',k};
  }
  /* spostamenti: campiona le tessere mobili */
  const mobile=[...S.valley.keys()].filter(k=>S.valley.get(k).frozenFor.length===0);
  for(const fromK of mobile){
    for(const toK of slideCands(S.valley,fromK)){
      const sc=botEvalSlide(fromK,toK,pi);
      if(sc>best.sc)best={sc,type:'slide',fromK,toK};
    }
  }
  let events=[];
  if(best.type==='place'){events=doPlace(best.k,tile,pi);
    if(!window.SIM)toast(PNAMES[pi]+' piazza '+tile.biomes.map(b=>TEMOJI[b]).join(''));
  }else if(best.type==='slide'){/* scarta la pescata */
    events=doSlide(best.fromK,best.toK,pi);
    if(!window.SIM)toast(PNAMES[pi]+' scarta e sposta una tessera');
  }else{advance();return}
  if(events.length&&!window.SIM)showFreezes(events,()=>advance());
  else advance();
}

/* ===== FLUSSO ===== */
function startHumanTurn(){
  if(!S.deck.length){advance();return}
  DRAWN=S.deck.pop();
  MODE_ACTION='place';SLIDE_FROM=null;
  S.phase='human';
  render();
}
function advance(){
  if(gameOver()){S.over=true;buildEnd();show('endOvl');render();return}
  S.seat++;
  if(S.seat>=S.np){S.round++;S.seat=0}
  if(gameOver()){S.over=true;buildEnd();show('endOvl');render();return}
  const pi=curIdx();
  render();
  if(S.players[pi].isBot){
    if(window.SIM){botTurn(pi)}
    else setTimeout(()=>botTurn(pi),650);
  }else startHumanTurn();
}
function humanPlace(q,r){
  if(S.phase!=='human'||MODE_ACTION!=='place'||!DRAWN)return;
  const k=key(q,r);
  if(!placeCells(S.valley).includes(k))return;
  const t=DRAWN;DRAWN=null;
  const events=doPlace(k,t,curIdx());
  S.phase='idle';
  if(events.length)showFreezes(events,()=>advance());
  else advance();
}
function humanSlide(toK){
  if(S.phase!=='human'||MODE_ACTION!=='slide'||!SLIDE_FROM)return;
  if(!canSlide(S.valley,SLIDE_FROM,toK))return;
  const events=doSlide(SLIDE_FROM,toK,curIdx());
  SLIDE_FROM=null;S.phase='idle';
  if(events.length)showFreezes(events,()=>advance());
  else advance();
}
function showFreezes(events,cb){
  let h='';
  for(const e of events){
    h+='<div class="card"><h2>'+TEMOJI[e.biome]+' '+TNAME[e.biome]+' — Livello '+(e.level+1)+' ('+e.size+' tessere)</h2>';
    h+='<div class="d">Congelata da <b>'+PNAMES[e.by]+'</b> (bonus +'+e.bonus+')</div><div style="margin-top:6px">';
    for(const[pi,n]of Object.entries(e.contrib))
      h+='<div class="netrow"><span><span class="chip" style="background:'+PCOLORS[pi]+'"></span>'+PNAMES[pi]+'</span><b>+'+(n*PTS_PER_TILE)+'</b></div>';
    h+='</div></div>';
  }
  h+='<div class="card"><div class="d">'+S.players.map(p=>p.name+': <b>'+p.score+'</b>').join(' · ')+'</div></div>';
  $('freezeBody').innerHTML=h;
  $('freezeOk').onclick=()=>{hide('freezeOvl');cb&&cb()};
  show('freezeOvl');render();
}
function buildEnd(){
  const rank=S.players.slice().sort((a,b)=>b.score-a.score);
  let h='<div class="card"><h2>Classifica</h2>'+rank.map((p,i)=>'<div class="netrow"><span><span class="chip" style="background:'+p.color+'"></span>'+(i+1)+'. '+p.name+'</span><b>'+p.score+' pt</b></div>').join('')+'</div>';
  h+='<div class="card"><h2>Congelamenti ('+S.log.length+')</h2>';
  S.log.forEach(e=>{h+='<div class="netrow"><span>R'+e.round+' '+TEMOJI[e.biome]+' L'+(e.level+1)+' ('+e.size+')</span><span>'+PNAMES[e.by]+'</span></div>'});
  h+='</div>';
  $('endBody').innerHTML=h;
}

/* ===== RENDERING ===== */
const $=id=>document.getElementById(id);
const show=id=>$(id).classList.add('on');
const hide=id=>$(id).classList.remove('on');
function toast(m){const t=$('toast');t.textContent=m;t.style.opacity=1;clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity=0,2000)}
function hexPts(cx,cy,s){const p=[];for(let k=0;k<6;k++){const a=Math.PI/180*(60*k-30);p.push([cx+s*Math.cos(a),cy+s*Math.sin(a)])}return p}
function wedgesFor(biomes){
  /* assegna i 6 spicchi ai biomi */
  if(biomes.length===1)return[0,0,0,0,0,0];
  if(biomes.length===2)return[0,0,0,1,1,1];
  if(biomes.length===3)return[0,0,1,1,2,2];
  return[0,0,1,1,2,3];
}
function tileSVG(t,cx,cy,s,hilite){
  const c=hexPts(cx,cy,s);let g='';
  const w=wedgesFor(t.biomes);
  const frozen=t.frozenFor.length>0;
  for(let i=0;i<6;i++){
    const col=TCOL[t.biomes[w[i]]];
    const p1=c[i],p2=c[(i+1)%6];
    g+='<path d="M'+cx+' '+cy+' L'+p1[0]+' '+p1[1]+' L'+p2[0]+' '+p2[1]+' Z" fill="'+col+'" stroke="'+col+'" stroke-width=".5"'+(frozen?' opacity=".45"':'')+'/>';
  }
  const stroke=hilite?'#D9A441':frozen?'#D9A441':'#1c1f19';
  g+='<path d="M'+c.map((p,i)=>(i?'L':'')+p[0]+' '+p[1]).join(' ')+' Z" fill="none" stroke="'+stroke+'" stroke-width="'+(hilite?2.8:frozen?2.2:1.5)+'"'+(frozen?' stroke-dasharray="2 2"':'')+'/>';
  /* token proprietario */
  if(t.owner!==null){
    g+='<circle cx="'+cx+'" cy="'+cy+'" r="'+(s*.22)+'" fill="'+PCOLORS[t.owner]+'" stroke="#1c1f19" stroke-width="1"/>';
  }
  /* biomi congelati */
  if(frozen){
    const fr=t.frozenFor.map(b=>TEMOJI[b]).join('');
    g+='<text x="'+cx+'" y="'+(cy-s*.45)+'" font-size="'+(s*.34)+'" text-anchor="middle">'+fr+'</text>';
  }
  return g;
}
function miniTile(t){
  const s=22;
  return '<svg width="'+(s*2)+'" height="'+(s*2)+'" viewBox="'+(-s*1.1)+' '+(-s*1.1)+' '+(s*2.2)+' '+(s*2.2)+'">'+tileSVG(t,0,0,s,false)+'</svg>';
}

const BMETA={};
function axialRound(qf,rf){
  let sf=-qf-rf,q=Math.round(qf),r=Math.round(rf),s2=Math.round(sf);
  const dq=Math.abs(q-qf),dr=Math.abs(r-rf),ds=Math.abs(s2-sf);
  if(dq>dr&&dq>ds)q=-r-s2;else if(dr>ds)r=-q-s2;return[q,r];
}
function hitHex(cx,cy){
  const m=BMETA.boardV;if(!m)return null;
  const svg=$('boardV').querySelector('svg');if(!svg)return null;
  const rect=svg.getBoundingClientRect();if(!rect.width)return null;
  const[vx,vy,vw,vh]=m.vb;const sc=Math.min(rect.width/vw,rect.height/vh);
  const ox=(rect.width-vw*sc)/2,oy=(rect.height-vh*sc)/2;
  const px=(cx-rect.left-ox)/sc+vx,py=(cy-rect.top-oy)/sc+vy;
  const rf=2*py/(3*m.s),qf=(Math.sqrt(3)/3*px-py/3)/m.s;
  const[q,r]=axialRound(qf,rf);const k=key(q,r);
  if(m.place.has(k))return{type:'place',q,r,k};
  if(S.valley.has(k))return{type:'tile',q,r,k};
  return null;
}

function renderBoard(){
  const el=$('boardV');if(!el||!S)return;
  const s=30,valley=S.valley;
  const cells=[...valley.keys()];
  const human=S.phase==='human';
  const pc=human&&MODE_ACTION==='place'?placeCells(valley):[];
  const sCands=human&&MODE_ACTION==='slide'&&SLIDE_FROM?slideCands(valley,SLIDE_FROM):[];
  const allK=cells.concat(pc).concat(sCands);
  let mnX=1e9,mnY=1e9,mxX=-1e9,mxY=-1e9;
  for(const k of allK){const[q,r]=unkey(k);
    const x=s*Math.sqrt(3)*(q+r/2),y=s*1.5*r;
    mnX=Math.min(mnX,x);mxX=Math.max(mxX,x);mnY=Math.min(mnY,y);mxY=Math.max(mxY,y)}
  const pad=s*3;
  BMETA.boardV={s,vb:[mnX-pad,mnY-pad,mxX-mnX+2*pad,mxY-mnY+2*pad],place:new Set(pc)};
  let svg='<svg class="board" viewBox="'+(mnX-pad)+' '+(mnY-pad)+' '+(mxX-mnX+2*pad)+' '+(mxY-mnY+2*pad)+'" preserveAspectRatio="xMidYMid meet">';
  for(const k of cells){const[q,r]=unkey(k);
    svg+=tileSVG(valley.get(k),s*Math.sqrt(3)*(q+r/2),s*1.5*r,s,k===SLIDE_FROM)}
  for(const k of pc){const[q,r]=unkey(k);
    const x=s*Math.sqrt(3)*(q+r/2),y=s*1.5*r;const c=hexPts(x,y,s*.92);
    svg+='<path d="M'+c.map((p,i)=>(i?'L':'')+p[0]+' '+p[1]).join(' ')+' Z" fill="rgba(217,164,65,.12)" stroke="#D9A441" stroke-width="1.5" stroke-dasharray="4 3"/>'}
  for(const k of sCands){const[q,r]=unkey(k);
    const x=s*Math.sqrt(3)*(q+r/2),y=s*1.5*r;const c=hexPts(x,y,s*.92);
    svg+='<path d="M'+c.map((p,i)=>(i?'L':'')+p[0]+' '+p[1]).join(' ')+' Z" fill="rgba(76,183,133,.2)" stroke="#4cb785" stroke-width="1.5" stroke-dasharray="4 3"/>'}
  svg+='</svg>';el.innerHTML=svg;
}

function render(){
  if(!S)return;
  $('rndLbl').textContent='R'+S.round+'/'+MAX_ROUNDS+' · mazzo '+S.deck.length;
  const pi=curIdx();
  const human=S.phase==='human';
  $('phaseTxt').innerHTML=human
    ?'<b>Tocca a te</b> · '+(MODE_ACTION==='place'?'piazza la tessera':'sposta'+(SLIDE_FROM?' → casella verde':' → tocca tessera'))
    :(S.over?'Partita finita':'<b>'+PNAMES[pi]+'</b> sta giocando…');
  $('ptsTxt').textContent=S.players.map(p=>p.name.replace('Bot ','')+':'+p.score).join(' ');
  renderBoard();
  /* tab Reti */
  let rh='';
  for(const b of BIOMES){
    const done=S.thIdx[b]>=THRESHOLDS.length;
    rh+='<div class="card"><h2>'+TEMOJI[b]+' '+TNAME[b]+' · '+(done?'completato':'soglia '+THRESHOLDS[S.thIdx[b]]+' (L'+(S.thIdx[b]+1)+')')+'</h2>';
    if(!done){
      const groups=networks(S.valley,b).sort((a,bb)=>bb.length-a.length).slice(0,4);
      if(!groups.length)rh+='<div class="d">Nessuna rete attiva</div>';
      for(const g of groups){
        const cnt={};
        for(const kk of g){const t=S.valley.get(kk);if(t.owner!==null)cnt[t.owner]=(cnt[t.owner]||0)+1}
        rh+='<div class="netrow"><span>'+g.length+'/'+THRESHOLDS[S.thIdx[b]]+' tessere</span><span>'
          +Object.entries(cnt).map(([o,n])=>'<span class="chip" style="background:'+PCOLORS[o]+'"></span>'+n).join(' ')+'</span></div>';
      }
    }
    rh+='</div>';
  }
  $('vReti').innerHTML=rh;
  /* tab Punti */
  let ph='<table><tr><th>Giocatore</th><th>Punti</th></tr>';
  S.players.forEach(p=>{ph+='<tr><td><span class="chip" style="background:'+p.color+'"></span>'+p.name+'</td><td><b>'+p.score+'</b></td></tr>'});
  ph+='</table>';
  if(S.log.length){ph+='<div class="card"><h2>Congelamenti</h2>';
    S.log.slice().reverse().forEach(e=>{ph+='<div class="netrow"><span>R'+e.round+' '+TEMOJI[e.biome]+' L'+(e.level+1)+' ('+e.size+' tess.)</span><span>'+PNAMES[e.by]+' +'+e.bonus+'</span></div>'});
    ph+='</div>'}
  $('vPunti').innerHTML=ph;
  /* mano */
  const hd=$('hand');
  if(human&&DRAWN){
    let hh='<div class="ctr"><div class="drawn"><div class="slot" id="drawnSlot">'+miniTile(DRAWN)+'</div>'
      +'<span class="lbl">'+DRAWN.biomes.map(b=>TNAME[b]).join('+')+'</span></div><div class="btns">';
    hh+='<button class="btn'+(MODE_ACTION==='place'?' act':'')+'" data-act="place">Piazza</button>';
    hh+='<button class="btn'+(MODE_ACTION==='slide'?' act':'')+'" data-act="slide">Scarta e sposta</button>';
    if(MODE_ACTION==='slide'&&SLIDE_FROM)hh+='<button class="btn warn" data-act="unslide">✕</button>';
    hh+='</div></div>';
    hd.innerHTML=hh;hd.style.display='block';
  }else if(human){hd.innerHTML='<div class="lbl">…</div>';hd.style.display='block'}
  else hd.style.display='none';
}
function setView(v){
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  ['vValle','vReti','vPunti'].forEach(id=>$(id).classList.remove('on'));
  $({valle:'vValle',reti:'vReti',punti:'vPunti'}[v]).classList.add('on');
  if(v==='valle')setTimeout(render,0);
}

/* ===== DRAG ===== */
let DRAG=null,PEND=null,lastDrop=0;
function dragStart(x,y){
  if(!S||S.phase!=='human'||MODE_ACTION!=='place'||!DRAWN)return;
  const g=document.createElement('div');
  g.style.cssText='position:fixed;z-index:300;pointer-events:none;transform:translate(-50%,-80%) scale(1.5);filter:drop-shadow(0 6px 10px rgba(0,0,0,.6))';
  g.innerHTML=miniTile(DRAWN);document.body.appendChild(g);
  DRAG={g};g.style.left=x+'px';g.style.top=y+'px';
}
document.addEventListener('pointermove',e=>{
  if(DRAG){e.preventDefault();DRAG.g.style.left=e.clientX+'px';DRAG.g.style.top=e.clientY+'px';return}
  if(PEND){const dx=e.clientX-PEND.x,dy=e.clientY-PEND.y;
    if(dx*dx+dy*dy>64){PEND=null;dragStart(e.clientX,e.clientY)}}
},{passive:false});
document.addEventListener('pointerup',e=>{
  PEND=null;
  if(DRAG){DRAG.g.remove();DRAG=null;
    if(Date.now()-lastDrop<400)return;
    const hit=hitHex(e.clientX,e.clientY);
    if(hit&&hit.type==='place'){lastDrop=Date.now();humanPlace(hit.q,hit.r)}}
});
document.addEventListener('pointercancel',()=>{if(DRAG){DRAG.g.remove();DRAG=null}PEND=null});

/* ===== CABLAGGIO ===== */
$('setup').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b||!b.dataset.bots)return;
  newGame(+b.dataset.bots);
  $('setup').style.display='none';
  startHumanTurn();
});
document.getElementById('tabs').addEventListener('click',e=>{
  const b=e.target.closest('button');if(b&&b.dataset.v)setView(b.dataset.v);
});
$('endExit').addEventListener('click',()=>location.reload());
$('boardV').addEventListener('click',e=>{
  if(!S||S.phase!=='human')return;
  if(Date.now()-lastDrop<500)return;
  const hit=hitHex(e.clientX,e.clientY);if(!hit)return;
  if(MODE_ACTION==='place'){
    if(hit.type==='place'){lastDrop=Date.now();humanPlace(hit.q,hit.r)}
  }else{
    if(!SLIDE_FROM){
      if(hit.type==='tile'){
        const t=S.valley.get(hit.k);
        if(t.frozenFor.length>0){toast('Tessera pietrificata');return}
        if(!slideCands(S.valley,hit.k).length){toast('Non può muoversi');return}
        SLIDE_FROM=hit.k;render();
      }
    }else{
      if(hit.k===SLIDE_FROM){SLIDE_FROM=null;render()}
      else if(hit.type!=='tile')humanSlide(hit.k);
    }
  }
});
$('hand').addEventListener('pointerdown',e=>{
  if(e.target.closest('#drawnSlot'))PEND={x:e.clientX,y:e.clientY};
});
$('hand').addEventListener('click',e=>{
  const b=e.target.closest('button');if(!b)return;
  const a=b.dataset.act;
  if(a==='place'){MODE_ACTION='place';SLIDE_FROM=null;render()}
  else if(a==='slide'){MODE_ACTION='slide';SLIDE_FROM=null;render();toast('La tessera pescata sarà scartata')}
  else if(a==='unslide'){SLIDE_FROM=null;render()}
});
/* SIM hook per test headless */
window.__sim=function(nBots){
  window.SIM=true;newGame(nBots);
  /* trasforma anche il giocatore 0 in bot */
  S.players[0].isBot=true;
  let guard=0;
  while(!S.over&&guard++<400){
    const pi=curIdx();
    if(!S.deck.length){S.over=true;break}
    botTurn(pi);
    if(gameOver())S.over=true;
  }
  return{rounds:S.round,scores:S.players.map(p=>p.score),log:S.log,deckLeft:S.deck.length};
};
</script>
